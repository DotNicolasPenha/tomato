<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install tm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    * {

      font-family: "JetBrains Mono", monospace;
      font-optical-sizing: auto;
      font-weight: 600;
      font-style: normal;
      margin: 0;
      padding: 0;
    }

    body {
      background: #151515;
      color: white;
    }
    .title {
        color: #ffffffdb;
        text-align: center;
        font-weight: 500;
        font-size: 20px;
        border: 2px solid #dedede42;
        background-color: #0c0c0c30;
        box-shadow: 2px 10px 30px #000000ba;
        width: max-content;
        padding: 10px;
        border-radius: 15px;
    }

    main {
      display: flex;
      position: absolute;
      width: 100%;
      height: 30%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      flex-direction: row;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    li {
      transition: 0.2s ease;
      height: 25px;
      width: 200px;
      background-color: #151515;
      border: 2px solid #dedede42;
      background-color: #0c0c0c30;
      box-shadow: 2px 10px 30px #000000;
      padding: 10px 10px;
      border-radius: 15px;
      list-style: none;
    }

    a {
      color: rgb(169, 169, 169);
      text-decoration: none;
      transition: 0.2s ease;
    }
    header{
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      border-bottom: 2px solid #dedede42;
      background-color: #0c0c0c30;
      box-shadow: 2px 10px 30px #000000ba;
      height: 50%;
      padding: 20px 30px;
      .logo{
        height: 50px;
        width: 50px;
        img{
          border-radius: 20px;
          background-color: #e9e9e9;
          width: 100%;
        }
      }
    }
    a:hover {
      color: #ffffff;
    }
    section:hover li:hover{
      transform: translateY(-2px) rotate(1deg) scale(1.1);
    }
    section {
      transition: 0.2s ease;
      text-align: center;
      width: 100%;
      height: 100%;
      max-height: 200px;
      max-width: 300px;
      border: 2px solid #dedede42;
      background-color: #101010;
      box-shadow: 2px 10px 30px #000000;
      padding: 30px 20px;
      border-radius: 15px;

      h2 {
          margin: 0;
      }
    }

    ul {
      margin-top: 20px;
      gap: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    @media (max-width: 1100px) {
      main {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <img src="https://static.thenounproject.com/png/tomato-icon-7918098-512.png" alt="">
    </div>
    <h2 class="title">Install Tomato!</h2> 
  </header>
  <main>

    <section>
      <h2>Darwin</h2>
      <ul>
        <li>
          <a href="./bin/tm-darwin-amd64" download>tm-darwin-amd64</a>
        </li>
        <li>
          <a href="./bin/tm-darwin-arm64" download>tm-darwin-arm64</a>
        </li>
      </ul>
    </section>

    <section>
      <h2>Windows</h2>
      <ul>
        <li>
          <a href="./bin/tm-windows-amd64.exe" download>tm-windows-amd64</a>
        </li>
      </ul>
    </section>

    <section>
      <h2>Linux</h2>
      <ul>
        <li>
          <a href="./bin/tm-linux-amd64">tm-linux-amd64</a>
        </li>
        <li>
          <a href="./bin/tm-darwin-arm64">tm-darwin-arm64</a>
        </li>
      </ul>
    </section>

  </main>
</body>

</html>
